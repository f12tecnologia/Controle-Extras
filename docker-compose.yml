services:
  app:
    build: .
    container_name: controle-extras
    ports:
      - "${APP_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      # Mantém o banco já configurado em EXTERNAL_DATABASE_URL no .env
      EXTERNAL_DATABASE_URL: ${EXTERNAL_DATABASE_URL}
    restart: unless-stopped
